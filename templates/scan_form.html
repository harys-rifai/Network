{% extends 'base.html' %}

{% block content %}
<div class="auth-box">
    <h1 class="matrix-title">{% if scan %}Edit Scan{% else %}New Scan{% endif %}</h1>
    <form method="post" class="hacker-form">
        {% csrf_token %}
        <div class="form-group"><label>IP Address</label><input type="text" name="ip" value="{{ scan.ip }}" required></div>
        <div class="form-group"><label>Device</label><input type="text" name="device" value="{{ scan.device }}" required></div>
        <div class="form-group"><label>OS</label><input type="text" name="os" value="{{ scan.os }}" required></div>
        <div class="form-group"><label>Brand</label><input type="text" name="brand" value="{{ scan.brand }}"></div>
        <div class="form-group"><label>Gateway</label><input type="text" name="gateway" value="{{ scan.gateway }}"></div>
        <div class="form-group"><label>Router</label><input type="text" name="router" value="{{ scan.router }}"></div>
        <div class="form-group"><label>DNS</label><input type="text" name="dns" value="{{ scan.dns }}"></div>
        <button type="submit" class="btn-primary">Save</button>
        <a href="{% url 'scan_list' %}" class="btn-small">Cancel</a>
    </form>
</div>
{% endblock %}
