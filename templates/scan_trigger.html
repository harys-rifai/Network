{% extends 'base.html' %}

{% block content %}
<div class="auth-box">
    <h1 class="matrix-title">Trigger Network Scan</h1>
    <form method="post" class="hacker-form">
        {% csrf_token %}
        <div class="form-group"><label>Subnet</label><input type="text" name="subnet" value="{{ subnet|default:'10.0.0.0/24' }}" required></div>
        <div class="form-group"><label>Max Hosts</label><input type="number" name="count" value="254" min="1" max="4094" required></div>
        <button type="submit" class="btn-primary">Run Scan</button>
        <a href="{% url 'scan_list' %}" class="btn-small">Cancel</a>
    </form>
    <p class="note">Real network scan using live host discovery. Defaults to your active interface subnet.</p>
</div>
{% endblock %}
